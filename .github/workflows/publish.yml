name: Publish

on:
  push:
    tags: ["v*"]

jobs:
  pypi:
    uses: hyperb1iss/shared-workflows/.github/workflows/python-publish.yml@v1
    permissions:
      contents: read
      id-token: write

  github-release:
    uses: hyperb1iss/shared-workflows/.github/workflows/github-release.yml@v1
    needs: [pypi]
    permissions:
      contents: write
      actions: read
    secrets: inherit

  aur:
    name: Update AUR
    runs-on: ubuntu-latest
    needs: [pypi]
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate .SRCINFO and publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: blocksd
          pkgbuild: packaging/aur/blocksd/PKGBUILD
          updpkgsums: true
          commit_message: "Update to ${{ steps.version.outputs.version }}"
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
